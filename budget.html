<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Budget DGDDI</title>

<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<!-- Marianne officielle -->
<link rel="stylesheet" href="https://www.systeme-de-design.gouv.fr/dist/fonts/Marianne/marianne.css">

<style>

/* ===== BASE ===== */
body {
  font-family: "Marianne", Arial, sans-serif;
  margin: 20px;
  background: #fff;
}

.tb-budg-container {
  max-width: 1200px;
  margin: auto;
}

/* ===== KPI ===== */
.tb-budg-kpis {
  display: flex;
  gap: 12px;
  margin: 20px 0;
}

.kpi-pill {
  border-radius: 999px;
  padding: 12px 18px;
  min-width: 160px;
  text-align: center;
  font-weight: 600;
  background:#e8f5e9;
}

/* ===== TABLE ===== */
.tb-budg-table {
  width:100%;
  border-collapse: collapse;
  font-size:12px;
}

.tb-budg-table th,
.tb-budg-table td {
  border:1px solid #d6dde8;
  padding:8px;
}

.tb-budg-table th {
  background:#e3e8f0;
}

/* niveaux */
.lvl1 td { background:#e3e8f0; font-weight:bold; cursor:pointer; }
.lvl2 td { background:#f1f4f9; cursor:pointer; }
.lvl3 td { background:#ffffff; }

.hidden { display:none; }

/* indentation */
.lvl1 td:first-child { padding-left:12px; }
.lvl2 td:first-child { padding-left:28px; }
.lvl3 td:first-child { padding-left:48px; }

/* flèches */
.lvl1 td:first-child::before { content:"▶ "; }
.lvl1.open td:first-child::before { content:"▼ "; }

.lvl2 td:first-child::before { content:"▶ "; }
.lvl2.open td:first-child::before { content:"▼ "; }

</style>
</head>

<body>

<div class="tb-budg-container">

<h2>Tableau de bord DGDDI</h2>

<!-- KPI -->
<div class="tb-budg-kpis">
  <div class="kpi-pill">AE : <span id="kpi-ae">0</span></div>
  <div class="kpi-pill">CP : <span id="kpi-cp">0</span></div>
</div>

<!-- TABLE -->
<table class="tb-budg-table">
<thead>
<tr>
  <th>Brique / Sous-brique / Activité</th>
  <th>AE consommées</th>
  <th>CP consommés</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
  <td><strong>TOTAL</strong></td>
  <td id="total-ae">0</td>
  <td id="total-cp">0</td>
</tr>
</tfoot>

</table>

</div>

<script>

/* ===== FORMAT M€ ===== */
function formatMillions(val){
  return (val / 1_000_000).toLocaleString('fr-FR', {
    minimumFractionDigits:1,
    maximumFractionDigits:1
  }) + " M€";
}

/* ===== GRIST ===== */
grist.ready({requiredAccess: 'read table'});

grist.onRecords(function(records) {

  const agg = {};
  let totalAE = 0;
  let totalCP = 0;

  records.forEach(r => {

    const brique = r.brique || "Non défini";
    const sous = r.sous_brique || "Non défini";
    const act = r.activite || "Non défini";

    const AE = Number(r.AE) || 0;
    const CP = Number(r.CP) || 0;

    if (!agg[brique]) agg[brique] = {};
    if (!agg[brique][sous]) agg[brique][sous] = {};
    if (!agg[brique][sous][act]) {
      agg[brique][sous][act] = { AE:0, CP:0 };
    }

    agg[brique][sous][act].AE += AE;
    agg[brique][sous][act].CP += CP;

    totalAE += AE;
    totalCP += CP;
  });

  /* ===== RENDER ===== */
  const tbody = document.getElementById("tbody");
  let html = "";

  Object.entries(agg).forEach(([brique, souss], i) => {

    let briqueAE = 0;
    let briqueCP = 0;

    Object.values(souss).forEach(acts => {
      Object.values(acts).forEach(v => {
        briqueAE += v.AE;
        briqueCP += v.CP;
      });
    });

    html += `
    <tr class="lvl1" data-brique="${i}">
      <td>${brique}</td>
      <td>${formatMillions(briqueAE)}</td>
      <td>${formatMillions(briqueCP)}</td>
    </tr>`;

    Object.entries(souss).forEach(([sous, acts], j) => {

      let sousAE = 0;
      let sousCP = 0;

      Object.values(acts).forEach(v => {
        sousAE += v.AE;
        sousCP += v.CP;
      });

      html += `
      <tr class="lvl2 hidden" data-parent="${i}" data-sous="${i}-${j}">
        <td>${sous}</td>
        <td>${formatMillions(sousAE)}</td>
        <td>${formatMillions(sousCP)}</td>
      </tr>`;

      Object.entries(acts).forEach(([act, v]) => {

        html += `
        <tr class="lvl3 hidden" data-parent="${i}-${j}">
          <td>${act}</td>
          <td>${formatMillions(v.AE)}</td>
          <td>${formatMillions(v.CP)}</td>
        </tr>`;
      });

    });

  });

  tbody.innerHTML = html;

  /* ===== ACCORDION ===== */

  document.querySelectorAll(".lvl1").forEach(row => {
    row.onclick = () => {
      const id = row.dataset.brique;
      const open = row.classList.toggle("open");

      document.querySelectorAll(`.lvl2[data-parent='${id}']`)
        .forEach(el => el.classList.toggle("hidden", !open));

      document.querySelectorAll(`.lvl3`)
        .forEach(el => {
          if (el.dataset.parent.startsWith(id + "-")) {
            el.classList.add("hidden");
          }
        });

      document.querySelectorAll(`.lvl2[data-parent='${id}']`)
        .forEach(el => el.classList.remove("open"));
    };
  });

  document.querySelectorAll(".lvl2").forEach(row => {
    row.onclick = (e) => {
      e.stopPropagation();
      const id = row.dataset.sous;
      const open = row.classList.toggle("open");

      document.querySelectorAll(`.lvl3[data-parent='${id}']`)
        .forEach(el => el.classList.toggle("hidden", !open));
    };
  });

  /* ===== KPI ===== */
  document.getElementById("kpi-ae").innerText = formatMillions(totalAE);
  document.getElementById("kpi-cp").innerText = formatMillions(totalCP);
  document.getElementById("total-ae").innerText = formatMillions(totalAE);
  document.getElementById("total-cp").innerText = formatMillions(totalCP);

});

</script>

</body>
</html>
