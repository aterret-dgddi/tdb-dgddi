<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Budget DGDDI</title>

<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<style>

/* ===== BASE ===== */
body {
  font-family: Arial;
  margin: 20px;
  background: #fff;
}

.tb-budg-container {
  max-width: 1200px;
  margin: auto;
}

/* ===== HEADER ===== */
.tb-budg-header-inner {
  display: flex;
  gap: 15px;
  align-items: center;
}

.tb-logo { height: 50px; }

/* ===== KPI ===== */
.tb-budg-kpis {
  display: flex;
  gap: 12px;
  margin: 20px 0;
}

.kpi-pill {
  border-radius: 999px;
  padding: 12px 18px;
  min-width: 140px;
  text-align: center;
  font-weight: 600;
}

.kpi-good { background:#e8f5e9; color:#1b5e20; }
.kpi-bad { background:#fdecea; color:#8b1c1c; }

/* ===== TABLE ===== */
.tb-budg-table {
  width:100%;
  border-collapse: collapse;
  font-size:12px;
}

.tb-budg-table th,
.tb-budg-table td {
  border:1px solid #d6dde8;
  padding:8px;
}

.tb-budg-table th {
  background:#e3e8f0;
}

.lvl1 td { background:#e3e8f0; font-weight:bold; }
.lvl2 td { background:#f1f4f9; }
.lvl3 td { background:#ffffff; }

tfoot td {
  font-weight:700;
  background:#d6dde8;
}

</style>
</head>

<body>

<div class="tb-budg-container">

<h2>Tableau de bord DGDDI</h2>

<!-- KPI -->
<div class="tb-budg-kpis">
  <div class="kpi-pill kpi-good">AE : <span id="kpi-ae">0</span></div>
  <div class="kpi-pill kpi-good">CP : <span id="kpi-cp">0</span></div>
</div>

<!-- TABLE -->
<table class="tb-budg-table">
<thead>
<tr>
  <th>Brique</th>
  <th>Sous-brique</th>
  <th>Activité</th>
  <th>AE consommées</th>
  <th>CP consommés</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
  <td colspan="3">TOTAL</td>
  <td id="total-ae">0</td>
  <td id="total-cp">0</td>
</tr>
</tfoot>

</table>

</div>

<script>

/* ===== INIT GRIST ===== */
grist.ready({requiredAccess: 'read table'});

grist.onRecords(function(records) {

  console.log("Records:", records);

  const agg = {};

  let totalAE = 0;
  let totalCP = 0;

  records.forEach(r => {

 
  /* ===== RENDER ===== */
const tbody = document.getElementById("tbody");

let html = "";

Object.entries(agg).forEach(([brique, souss]) => {

  let briqueAE = 0;
  let briqueCP = 0;

  html += `
  <tr class="lvl1">
    <td>${brique}</td>
    <td></td>
    <td></td>
    <td></td>
    <td></td>
  </tr>`;

  Object.entries(souss).forEach(([sous, acts]) => {

    let sousAE = 0;
    let sousCP = 0;

    html += `
    <tr class="lvl2">
      <td></td>
      <td>${sous}</td>
      <td></td>
      <td></td>
      <td></td>
    </tr>`;

    Object.entries(acts).forEach(([act, val]) => {

      sousAE += val.AE;
      sousCP += val.CP;

      html += `
      <tr class="lvl3">
        <td></td>
        <td></td>
        <td>${act}</td>
        <td>${val.AE.toLocaleString()}</td>
        <td>${val.CP.toLocaleString()}</td>
      </tr>`;
    });

    briqueAE += sousAE;
    briqueCP += sousCP;

    html += `
    <tr class="lvl2">
      <td></td>
      <td><strong>Total ${sous}</strong></td>
      <td></td>
      <td><strong>${sousAE.toLocaleString()}</strong></td>
      <td><strong>${sousCP.toLocaleString()}</strong></td>
    </tr>`;
  });

  html += `
  <tr class="lvl1">
    <td><strong>Total ${brique}</strong></td>
    <td></td>
    <td></td>
    <td><strong>${briqueAE.toLocaleString()}</strong></td>
    <td><strong>${briqueCP.toLocaleString()}</strong></td>
  </tr>`;
});

tbody.innerHTML = html;

/* injection propre */
tbody.innerHTML = html;
  /* ===== KPI ===== */
 document.getElementById("kpi-ae").innerText = totalAE.toLocaleString();
document.getElementById("kpi-cp").innerText = totalCP.toLocaleString();

  document.getElementById("total-ae").innerText = totalAE.toLocaleString();
  document.getElementById("total-cp").innerText = totalCP.toLocaleString();

});

</script>

</body>
</html>
