<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Budget DGDDI</title>

<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<!-- Marianne font -->
<link href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@latest/dist/fonts/Marianne/font.css" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
  font-family: "Marianne", Arial, sans-serif;
  margin: 20px;
  background: #f6f7fb;
}

.tb-budg-container {
  max-width: 1200px;
  margin: auto;
}

/* ===== CARD ===== */
.tb-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  margin-bottom: 30px;
  overflow: hidden;
}

.tb-card-header {
  padding: 14px 18px;
  font-weight: 700;
  background: #e3e8f0;
}

.tb-card-body {
  padding: 10px;
}

/* ===== KPI ===== */
.tb-budg-kpis {
  display: flex;
  gap: 12px;
  margin: 20px 0;
}

.kpi-pill {
  border-radius: 999px;
  padding: 10px 16px;
  min-width: 140px;
  text-align: center;
  font-weight: 600;
  background:#e8f5e9;
}

/* ===== TABLE ===== */
.tb-budg-table {
  width:100%;
  border-collapse: collapse;
  font-size:12px;
}

.tb-budg-table th,
.tb-budg-table td {
  border:1px solid #d6dde8;
  padding:6px;
}

.tb-budg-table th {
  background:#e3e8f0;
}

.lvl1 td { background:#e3e8f0; font-weight:bold; }
.lvl2 td { background:#f1f4f9; }
.lvl3 td { background:#ffffff; }

tfoot td {
  font-weight:700;
  background:#d6dde8;
}

/* ===== ACCORDION ===== */
.lvl1, .lvl2 { cursor:pointer; }

.hidden { display:none; }

.lvl1 td:first-child::before { content:"▶ "; }
.lvl1.open td:first-child::before { content:"▼ "; }

.lvl2 td:first-child::before { content:"▶ "; }
.lvl2.open td:first-child::before { content:"▼ "; }

.lvl1 td { padding-left:10px; }
.lvl2 td { padding-left:25px; }
.lvl3 td { padding-left:45px; }

</style>
</head>

<body>

<div class="tb-budg-container">

<h2>Tableau de bord DGDDI</h2>

<!-- KPI -->
<div class="tb-budg-kpis">
  <div class="kpi-pill">AE : <span id="kpi-ae">0</span> M€</div>
  <div class="kpi-pill">CP : <span id="kpi-cp">0</span> M€</div>
</div>

<!-- ================= TABLEAU PRINCIPAL ================= -->
<div class="tb-card">
  <div class="tb-card-header">Suivi de la consommation par brique budgétaire</div>
  <div class="tb-card-body">

    <table class="tb-budg-table">
      <thead>
        <tr>
          <th>Brique / Sous-brique / Activité</th>
          <th>AE (M€)</th>
          <th>CP (M€)</th>
        </tr>
      </thead>

      <tbody id="tbody"></tbody>

      <tfoot>
        <tr>
          <td>TOTAL</td>
          <td id="total-ae">0</td>
          <td id="total-cp">0</td>
        </tr>
      </tfoot>
    </table>

  </div>
</div>

<!-- ================= TABLEAU RECEPTION ================= -->
<div class="tb-card">
  <div class="tb-card-header">Suivi des dépenses de réception</div>
  <div class="tb-card-body">

    <table class="tb-budg-table">
      <thead>
        <tr>
          <th>Centre financier</th>
          <th>AE (M€)</th>
          <th>CP (M€)</th>
        </tr>
      </thead>

      <tbody id="tbody-reception"></tbody>

      <tfoot>
        <tr>
          <td>TOTAL</td>
          <td id="rec-ae">0</td>
          <td id="rec-cp">0</td>
        </tr>
      </tfoot>
    </table>

  </div>
</div>

</div>

<script>

const toM = v => (v / 1_000_000);

/* ===== INIT ===== */
grist.ready({requiredAccess: 'read table'});

grist.onRecords(function(records) {

  const agg = {};
  const reception = {};

  let totalAE = 0;
  let totalCP = 0;

  let recAE = 0;
  let recCP = 0;

  records.forEach(r => {

    const brique = r.brique || "Non défini";
    const sous = r.sous_brique || "Non défini";
    const act = r.activite || "Non défini";

    const AE = Number(r.AE) || 0;
    const CP = Number(r.CP) || 0;

    /* ===== AGRÉGATION PRINCIPALE ===== */
    if (!agg[brique]) agg[brique] = {};
    if (!agg[brique][sous]) agg[brique][sous] = {};
    if (!agg[brique][sous][act]) {
      agg[brique][sous][act] = { AE: 0, CP: 0 };
    }

    agg[brique][sous][act].AE += AE;
    agg[brique][sous][act].CP += CP;

    totalAE += AE;
    totalCP += CP;

    /* ===== FILTRE RECEPTION ===== */
    if (String(r.pcepropre) === "6156000000") {

      const cf = r.centrefinancier || "Non défini";

      if (!reception[cf]) reception[cf] = { AE:0, CP:0 };

      reception[cf].AE += AE;
      reception[cf].CP += CP;

      recAE += AE;
      recCP += CP;
    }

  });

  /* ===== RENDER PRINCIPAL ===== */
  let html = "";

  Object.entries(agg).forEach(([brique, souss], i) => {

    let bAE = 0, bCP = 0;

    Object.values(souss).forEach(acts => {
      Object.values(acts).forEach(v => {
        bAE += v.AE;
        bCP += v.CP;
      });
    });

    html += `<tr class="lvl1" data-brique="${i}">
      <td>${brique}</td>
      <td>${toM(bAE).toFixed(2)}</td>
      <td>${toM(bCP).toFixed(2)}</td>
    </tr>`;

    Object.entries(souss).forEach(([sous, acts], j) => {

      let sAE = 0, sCP = 0;

      Object.values(acts).forEach(v => {
        sAE += v.AE;
        sCP += v.CP;
      });

      html += `<tr class="lvl2 hidden" data-parent="${i}" data-sous="${i}-${j}">
        <td>${sous}</td>
        <td>${toM(sAE).toFixed(2)}</td>
        <td>${toM(sCP).toFixed(2)}</td>
      </tr>`;

      Object.entries(acts).forEach(([act, v]) => {

        html += `<tr class="lvl3 hidden" data-parent="${i}-${j}">
          <td>${act}</td>
          <td>${toM(v.AE).toFixed(2)}</td>
          <td>${toM(v.CP).toFixed(2)}</td>
        </tr>`;
      });

    });

  });

  document.getElementById("tbody").innerHTML = html;

  /* ===== ACCORDION ===== */
  document.querySelectorAll(".lvl1").forEach(row => {
    row.onclick = () => {
      const id = row.dataset.brique;
      const open = row.classList.toggle("open");

      document.querySelectorAll(`.lvl2[data-parent='${id}']`)
        .forEach(el => el.classList.toggle("hidden", !open));
    };
  });

  document.querySelectorAll(".lvl2").forEach(row => {
    row.onclick = (e) => {
      e.stopPropagation();
      const id = row.dataset.sous;
      const open = row.classList.toggle("open");

      document.querySelectorAll(`.lvl3[data-parent='${id}']`)
        .forEach(el => el.classList.toggle("hidden", !open));
    };
  });

  /* ===== KPI ===== */
  document.getElementById("kpi-ae").innerText = toM(totalAE).toFixed(2);
  document.getElementById("kpi-cp").innerText = toM(totalCP).toFixed(2);

  document.getElementById("total-ae").innerText = toM(totalAE).toFixed(2);
  document.getElementById("total-cp").innerText = toM(totalCP).toFixed(2);

  /* ===== RENDER RECEPTION ===== */
  let htmlRec = "";

  Object.entries(reception).forEach(([cf, v]) => {
    htmlRec += `<tr>
      <td>${cf}</td>
      <td>${toM(v.AE).toFixed(2)}</td>
      <td>${toM(v.CP).toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("tbody-reception").innerHTML = htmlRec;

  document.getElementById("rec-ae").innerText = toM(recAE).toFixed(2);
  document.getElementById("rec-cp").innerText = toM(recCP).toFixed(2);

});

</script>

</body>
</html>
