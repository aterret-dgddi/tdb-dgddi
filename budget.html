<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau brique DGDDI</title>

<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f8fafc;
  margin: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h2 {
  margin-bottom: 20px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  padding: 8px 10px;
  border: 1px solid #d6dde8;
  font-size: 12px;
  text-align: center;
}

th {
  background: #e3e8f0;
}

td:first-child, th:first-child {
  text-align: left;
  font-weight: 600;
}

/* NIVEAUX */
.lvl1 td { background: #e3e8f0; font-weight: 700; }
.lvl2 td { background: #f1f4f9; }
.lvl3 td { background: #f8fafc; }

/* ESPACEMENT PROPRE */
tbody tr.lvl1 td {
  border-top: 8px solid #f8fafc;
}

/* COLORS */
.good { color: #2e7d32; }
.neutral { color: #2f3b52; }

</style>
</head>

<body>

<div class="container">

  <h2>Consommation 2026 par brique</h2>

  <table class="table-brique">
    <thead>
      <tr>
        <th>Brique / Sous-brique / Activité</th>
        <th>AE consommées</th>
        <th>CP consommés</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

/* ===== PARSER NUMERIQUE ROBUSTE ===== */
function toNumber(val) {
  if (val === null || val === undefined) return 0;

  if (typeof val === "string") {
    val = val.replace(/\s/g, "").replace(",", ".");
  }

  const n = Number(val);
  return isNaN(n) ? 0 : n;
}

/* ===== BUILD HIERARCHY ===== */
function buildHierarchy(records) {
  const data = {};

  records.forEach(r => {

    const brique = r.brique || "Non renseigné";
    const sous = r.sous_brique || "Non renseigné";
    const act = r.libact || "Activité inconnue";

    const AE = toNumber(r.AE);
    const CP = toNumber(r.CP);

    if (!data[brique]) {
      data[brique] = { AE: 0, CP: 0, sous: {} };
    }

    data[brique].AE += AE;
    data[brique].CP += CP;

    if (!data[brique].sous[sous]) {
      data[brique].sous[sous] = { AE: 0, CP: 0, act: {} };
    }

    data[brique].sous[sous].AE += AE;
    data[brique].sous[sous].CP += CP;

    if (!data[brique].sous[sous].act[act]) {
      data[brique].sous[sous].act[act] = { AE: 0, CP: 0 };
    }

    data[brique].sous[sous].act[act].AE += AE;
    data[brique].sous[sous].act[act].CP += CP;
  });

  return data;
}

/* ===== FORMAT ===== */
function format(n) {
  return n.toLocaleString("fr-FR");
}

/* ===== RENDER ===== */
function render(data) {
  const tbody = document.querySelector(".table-brique tbody");
  tbody.innerHTML = "";

  Object.entries(data).forEach(([brique, bData]) => {

    // LVL1
    const tr1 = document.createElement("tr");
    tr1.className = "lvl1";
    tr1.innerHTML = `
      <td>${brique}</td>
      <td class="good">${format(bData.AE)}</td>
      <td class="neutral">${format(bData.CP)}</td>
    `;
    tbody.appendChild(tr1);

    // LVL2
    Object.entries(bData.sous).forEach(([sous, sData]) => {

      const tr2 = document.createElement("tr");
      tr2.className = "lvl2";
      tr2.innerHTML = `
        <td>${sous}</td>
        <td class="good">${format(sData.AE)}</td>
        <td class="neutral">${format(sData.CP)}</td>
      `;
      tbody.appendChild(tr2);

      // LVL3
      Object.entries(sData.act).forEach(([act, aData]) => {

        const tr3 = document.createElement("tr");
        tr3.className = "lvl3";
        tr3.innerHTML = `
          <td>${act}</td>
          <td>${format(aData.AE)}</td>
          <td>${format(aData.CP)}</td>
        `;
        tbody.appendChild(tr3);

      });

    });

  });
}

/* ===== GRIST ===== */
grist.ready({ requiredAccess: 'read table' });

grist.onRecords((records) => {

  if (!records || records.length === 0) {
    console.warn("Aucune donnée reçue");
    return;
  }

  console.log("Records :", records.length);

  const data = buildHierarchy(records);

  console.log("Hiérarchie :", data);

  render(data);
});

</script>

</body>
</html><!DOCTYPE html>
